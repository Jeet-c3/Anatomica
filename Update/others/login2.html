<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Character Login | Anatomica</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        :root {
            --bg-color: #e6eef5;
            --shadow-light: #ffffff;
            --shadow-dark: #c5d2e0;
            --text-main: #334155;
            --text-sub: #64748b;
            --primary: #3b82f6;
            
            --c-purple: #9333ea;
            --c-pink: #ec4899;
            --c-yellow: #f59e0b;
            --c-blue: #0ea5e9;
            --c-white: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        /* --- Claymorphism Base Styles --- */
        .clay-box {
            background: #f0f5f9;
            border-radius: 2.5rem;
            box-shadow: 
                20px 20px 40px var(--shadow-dark), 
                -20px -20px 40px var(--shadow-light),
                inset 4px 4px 10px rgba(255, 255, 255, 0.9),
                inset -4px -4px 10px rgba(0, 0, 0, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.6);
        }

        .clay-inset {
            background: #e6eef5;
            box-shadow: 
                inset 8px 8px 16px var(--shadow-dark), 
                inset -8px -8px 16px var(--shadow-light);
            border-radius: 2rem;
        }

        .clay-btn {
            background: #f0f5f9;
            border-radius: 1.5rem;
            box-shadow: 
                6px 6px 12px var(--shadow-dark), 
                -6px -6px 12px var(--shadow-light),
                inset 2px 2px 5px rgba(255, 255, 255, 0.9),
                inset -2px -2px 5px rgba(0, 0, 0, 0.03);
            font-weight: 700;
            color: var(--text-main);
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .clay-btn:active {
            box-shadow: 
                inset 6px 6px 12px var(--shadow-dark), 
                inset -6px -6px 12px var(--shadow-light);
            transform: scale(0.98);
        }

        .clay-btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 
                8px 8px 16px var(--shadow-dark), 
                -8px -8px 16px var(--shadow-light),
                inset 3px 3px 8px rgba(255, 255, 255, 0.4),
                inset -3px -3px 8px rgba(0, 0, 0, 0.2);
            border: none;
        }

        .clay-input {
            background: #e6eef5;
            box-shadow: 
                inset 6px 6px 12px var(--shadow-dark), 
                inset -6px -6px 12px var(--shadow-light);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            width: 100%;
            padding: 14px 20px;
            border-radius: 1.2rem;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
        }

        .clay-input:focus { border-color: var(--primary); }
        .clay-input::placeholder { color: #94a3b8; }

        /* --- Layout --- */
        .login-card {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            min-height: 720px;
            overflow: hidden;
            animation: fadeScaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @media (min-width: 900px) {
            .login-card { flex-direction: row; }
        }

        @keyframes fadeScaleIn {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .illustration-side {
            flex: 1.15;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            border-radius: 2rem 2rem 0 0;
            margin: 10px;
        }

        @media (min-width: 900px) {
            .illustration-side { border-radius: 2rem; }
        }

        /* --- Characters (With Clay Shadows added!) --- */
        .char-container { position: relative; width: 380px; height: 300px; bottom: -2px; }
        .char {
            position: absolute;
            bottom: 0;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) backwards !important;
            box-shadow: inset 6px 6px 12px rgba(255,255,255,0.4), inset -6px -6px 12px rgba(0,0,0,0.15); /* Clay effect */
        }

        @keyframes slideUp { 
            from { transform: translateY(100%); } 
            to { transform: translateY(0); } 
        }

        .purple { width: 95px; height: 220px; background: var(--c-purple); left: 40px; border-radius: 30px 30px 0 0; z-index: 1; animation-delay: 0.1s !important; }
        .pink { width: 65px; height: 150px; background: var(--c-pink); left: 330px; border-radius: 25px 25px 0 0; z-index: 3; animation-delay: 0.2s !important; }
        .yellow { width: 75px; height: 190px; background: var(--c-yellow); right: 60px; border-radius: 25px 25px 0 0; z-index: 2; animation-delay: 0.3s !important; }
        .black { width: 75px; height: 205px; background: var(--c-blue); right: 160px; border-radius: 25px 25px 0 0; z-index: 2; animation-delay: 0.3s !important; }
        .white { width: 190px; height: 95px; background: var(--c-white); left: 65px; border-radius: 95px 95px 0 0; z-index: 3; animation-delay: 0.4s !important; }

        /* Character Details */
        .eye-container { position: absolute; top: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; }
        .purple .eye-container { top: 40px; gap: 20px; }
        .pink .eye-container { top: 25px; gap: 12px; position: relative; align-items: center; }
        .yellow .eye-container { top: 35px; gap: 16px; }
        .white .eye-container { top: 35px; gap: 35px; }

        .eye { 
            width: 12px; height: 12px; 
            background: white; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center;
            position: relative; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: blink 4s infinite ease-in-out;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .white .eye { width: 14px; height: 14px; }
        .pupil { width: 5px; height: 5px; background: #1e293b; border-radius: 50%; position: absolute; transition: opacity 0.2s; }
        .white .pupil { width: 6px; height: 6px; }

        .white-smile { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 12px; height: 6px; border-bottom: 2.5px solid #1e293b; border-radius: 50%; }
        .yellow-smile { position: absolute; bottom: 125px; left: 50%; transform: translateX(-50%); width: 12px; height: 6px; border-bottom: 3px solid #1e293b; border-radius: 50%; }
        .pink-smile { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); width: 12px; height: 6px; border-bottom: 2.5px solid #1e293b; border-radius: 50%; }
        .black-smile { position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%); width: 12px; height: 6px; border-bottom: 2.5px solid #1e293b; border-radius: 50%; }
        .purple-smile { position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%); width: 12px; height: 6px; border-bottom: 2.5px solid #1e293b; border-radius: 50%; }

        .is-hiding .purple { transform: translateY(140px) translateX(-10px) rotate(-8deg); }
        .is-hiding .pink { transform: translateY(140px); }
        .is-hiding .yellow { transform: translateY(150px) translateX(10px) rotate(8deg); }
        .is-hiding .white .eye { height: 4px; background: #1e293b; border-radius: 4px; margin-top: 5px; box-shadow: none;}
        .is-hiding .white .pupil { opacity: 0; }

        /* Form Side */
        .form-side { flex: 0.85; padding: 40px 30px; display: flex; flex-direction: column; justify-content: center; }
        @media (min-width: 900px) { .form-side { padding: 70px 80px; } }

        .logo { margin-bottom: 30px; width: 48px; height: 48px; border-radius: 16px; background: var(--primary); display: flex; align-items: center; justify-content: center; box-shadow: inset 2px 2px 6px rgba(255,255,255,0.4), 4px 4px 10px var(--shadow-dark);}
        .header h2 { font-size: 32px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; letter-spacing: -0.5px; }
        .header p { color: var(--text-sub); font-size: 15px; margin-bottom: 40px; font-weight: 600; }

        .input-group { margin-bottom: 24px; position: relative; }
        .input-group label { display: block; font-size: 14px; font-weight: 700; color: var(--text-sub); margin-bottom: 10px; margin-left: 5px; }

        .toggle-btn { position: absolute; right: 15px; bottom: 14px; cursor: pointer; border: none; background: none; color: var(--text-sub); display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
        .toggle-btn:hover { color: var(--primary); }
        .toggle-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        .form-options { display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; margin-bottom: 35px; color: var(--text-sub); padding: 0 5px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .checkbox-label input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; border-radius: 4px; }
        .form-options a { color: var(--primary); text-decoration: none; transition: opacity 0.2s; }
        .form-options a:hover { opacity: 0.8; }

        .btn-main { width: 100%; padding: 16px; font-size: 16px; margin-bottom: 20px; }
        .btn-google { width: 100%; padding: 15px; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 15px; margin-bottom: 20px; }

        .footer-text { text-align: center; font-size: 14px; color: var(--text-sub); font-weight: 600; margin-top: 10px; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 800; }

        /* Animation & Detail Elements */
        .lens { position: absolute; width: 28px; height: 28px; border: 2.5px solid #1e293b; border-radius: 45%; border-top-left-radius: 0px; background: rgba(255, 255, 255, 0.4); z-index: 10; pointer-events: none; }
        .danda { width: 2px; height: 2px; background: #1e293b; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); z-index: 11; }
        .pink .lens-left { left: 4px; }
        .pink .lens-right { right: 4px; border-top-right-radius: 0px; border-top-left-radius: 50%; }

        .lensi { position: absolute; width: 23px; height: 18px; border: 2.5px solid #1e293b; background: rgba(255, 255, 255, 0.4); z-index: 10; pointer-events: none; top: -2px; border-radius: 4px;}
        .dandi { width: 5px; height: 2.5px; background: #1e293b; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); z-index: 11; }
        .black .lens-left { left: 13px; }
        .black .lens-right { right: 13px; }

        .cute { position: absolute; top: -10px; left: 90%; transform: translateX(-50%); font-size: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .whitei-smile { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); }

        @keyframes blink { 0%, 2%, 100% { transform: scaleY(1); } 1% { transform: scaleY(0.1); } }
        .purple .eye { animation-delay: 0.2s; }
        .pink .eye { animation-delay: 1.5s; }
        .yellow .eye { animation-delay: 0.7s; }
        .black .eye { animation-delay: 2.1s; }
        .white .eye { animation-delay: 0.5s; }

        @keyframes bob { 0%, 100% { margin-top: 0; } 50% { margin-top: 3px; } }
        .eye-container, .yellow-smile, .pink-smile, .black-smile, .purple-smile, .whitei-smile, .cute, .lens, .lensi, .danda, .dandi { animation: bob 3s infinite ease-in-out; }

        .is-closed-eyes .eye { height: 4px !important; background: #1e293b !important; border-radius: 4px !important; margin-top: 6px; animation: none; box-shadow: none;}
        .is-closed-eyes .pupil { opacity: 0; }

        /* Hats & Extras */
        .yellow .cap { position: absolute; top: -12px; left: -3px; width: 81px; height: 32px; background: #1e293b; border-radius: 30px 30px 0 0; z-index: 15; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.2);}
        .yellow .cap-brim { position: absolute; bottom: 0px; left: -22px; width: 35px; height: 10px; background: #ef4444; border-radius: 10px 0 0 10px; border: 2px solid #1e293b; border-right: none; }
        .yellow .cap::after { content: ''; position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 10px; height: 5px; background: #ef4444; border-radius: 5px 5px 0 0; }
        
        .white-half { background: #1e293b; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); width: 191px; height: 20px; border-top: 2.5px solid #0f172a; box-shadow: 0px -5px 15px rgba(0,0,0,0.2); }
        .panda { position: absolute; width: 28px; height: 28px; border-radius: 50%; background: #1e293b; box-shadow: 0px 0px 6px 6px #1e293b; z-index: 10; pointer-events: none; }
        
        .white .eare-container { position: relative; top: 10px; display: flex; justify-content: center; align-items: center; gap: 6px; }
        .white .lens-left { left: 11px; }
        .white .lens-right { right: 11px; }
        .white .eye-container { top: 25px; gap: 32px; }
        .white .eye { width: 36px !important; height: 42px !important; background: #1e293b !important; border-radius: 55% 45% 55% 45% !important; box-shadow: inset 2px 2px 6px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
        .white .eye:nth-child(1) { transform: rotate(-12deg); }
        .white .eye:nth-child(2) { transform: rotate(12deg); border-radius: 45% 55% 45% 55% !important; }
        .white .pupil { width: 14px !important; height: 14px !important; background: white !important; border-radius: 50% !important; position: relative !important; display: flex; justify-content: center; align-items: center; opacity: 1 !important; }
        .white .pupil::after { content: ''; width: 6px; height: 6px; background: #1e293b; border-radius: 50%; position: absolute; }
        
        .is-hiding .white .eye, .is-closed-eyes .white .eye { height: 44px !important; background: #1e293b !important; margin-top: 0 !important; }
        .is-hiding .white .pupil, .is-closed-eyes .white .pupil { height: 4px !important; border-radius: 2px !important; background: white !important; opacity: 1 !important; }
        .is-hiding .white .pupil::after, .is-closed-eyes .white .pupil::after { display: none; }

        .purple .cap { position: absolute; top: -12px; left: -3px; width: 100px; height: 47px; background: #451a03; border-radius: 30px 30px 0 0; z-index: 15; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1); }
        .purple .cap::after { content: ''; position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 10px; height: 5px; border-radius: 5px 5px 0 0; background: #290f02;}
        .cap-V { position: absolute; top: 30px; left: 35px; background: var(--c-purple); width: 30px; height: 20px; border-radius: 30px 30px 0 0; }

        .black .cowboy-hat { position: absolute; top: -26px; left: 50%; transform: translateX(-50%); width: 52px; height: 38px; background: #8B4513; border-radius: 30px 30px 0 0; z-index: 15; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.2), inset 0 8px 0 -3px #6b340e; }
        .black .cowboy-hat::before { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); width: 105px; height: 22px; background: #8B4513; border-radius: 50%; z-index: -1; box-shadow: 0 4px 5px rgba(0,0,0,0.2); }
        .black .cowboy-hat::after { content: ''; position: absolute; bottom: 4px; left: 0; width: 100%; height: 6px; background: #3e1f06; border-radius: 2px; }

        /* Blossoms */
        .blossom-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .petal { position: absolute; top: -20px; width: 12px; height: 18px; background: linear-gradient(to bottom, #ffc0cb, #f8bbd0); border-radius: 80% 10% 80% 10%; opacity: 0; filter: drop-shadow(0 0 5px rgba(255, 182, 193, 0.4)); animation: drift 15s linear infinite; }
        
        @keyframes drift {
            0% { transform: translateY(0) translateX(0) rotate(0deg) scale(0.8); opacity: 0; }
            15% { opacity: 0.8; }
            85% { opacity: 0.8; }
            100% { transform: translateY(110vh) translateX(150px) rotate(720deg) scale(1.2); opacity: 0; }
        }
        
        .petal:nth-child(1) { left: 10%; animation-delay: 0s; width: 14px; height: 20px; }
        .petal:nth-child(2) { left: 25%; animation-delay: 5s; transform: rotate(45deg); }
        .petal:nth-child(3) { left: 45%; animation-delay: 2s; width: 10px; filter: blur(1px); }
        .petal:nth-child(4) { left: 60%; animation-delay: 8s; }
        .petal:nth-child(5) { left: 80%; animation-delay: 3s; width: 15px; height: 22px; }
        .petal:nth-child(6) { left: 90%; animation-delay: 11s; filter: blur(0.5px); }
        .petal:nth-child(7) { left: 35%; animation-delay: 14s; }
        .petal:nth-child(8) { left: 70%; animation-delay: 6s; opacity: 0.5; }
    </style>
</head>
<body>

<div class="login-card clay-box">
    
    <div class="illustration-side clay-inset" id="illustration">
        <div class="blossom-container">
            <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
            <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
        </div>
        
        <div class="char-container">
            <div class="char purple">
                <div class="cap"><div class="cap-V"></div></div>
                <div class="eye-container">
                    <div class="eye"><div class="pupil"></div></div>
                    <div class="eye"><div class="pupil"></div></div>
                </div>
                <div class="purple-smile"></div>
            </div>
           
            <div class="char pink">
                <div class="cute">🎀</div>
                <div class="eye-container">
                    <div class="lens lens-left"></div>
                    <div class="danda"></div>
                    <div class="lens lens-right"></div>
                    <div class="eye"><div class="pupil"></div></div>
                    <div class="eye"><div class="pupil"></div></div>
                </div>
                <div class="pink-smile"></div>
            </div>

            <div class="char black">
                <div class="cowboy-hat"></div>
                <div class="eye-container">
                    <div class="eye"><div class="pupil"></div></div>
                    <div class="eye"><div class="pupil"></div></div>
                </div>
                <div class="black-smile"></div>
                <div class="eye-container">
                    <div class="lensi lens-left"></div>
                    <div class="dandi"></div>   
                    <div class="lensi lens-right"></div>
                    <div class="eye"><div class="pupil"></div></div>
                    <div class="eye"><div class="pupil"></div></div>
                </div>
            </div>

            <div class="char yellow">
                <div class="cap"><div class="cap-brim"></div></div>
                <div class="eye-container">
                    <div class="eye"><div class="pupil"></div></div>
                    <div class="eye"><div class="pupil"></div></div>
                </div>
                <div class="yellow-smile"></div>
            </div>
            
            <div class="char white">
                <div class="eye-container">
                    <div class="eye"><div class="pupil"></div></div>
                    <div class="eye"><div class="pupil"></div></div>
                </div>
                <div class="eare-container">
                    <div class="panda lens-left"></div>
                    <div class="panda lens-right"></div>        
                </div>
                <div class="white-smile"></div>
                <div class="white-half"></div>
            </div>
        </div>
    </div>

    <form class="form-side" id="loginForm">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round">
                <path d="M12 2L22 22H2L12 2Z" fill="white"/>
                <path d="M12 8L16 16H8L12 8Z" fill="var(--primary)"/>
            </svg>
        </div>

        <div class="header">
            <h2>Welcome To Anatomica!</h2>
            <p>Please enter your details to continue</p>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="emailInput" class="clay-input" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="passInput" class="clay-input" placeholder="Enter your password" required>
            <button class="toggle-btn" id="toggleShow" type="button">
                <svg id="eyeIcon" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>

        <div class="form-options">
            <label class="checkbox-label">
                <input type="checkbox" id="rememberMe"> Remember me
            </label>
            <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="clay-btn clay-btn-primary btn-main">Sign In</button>
        
        <button type="button" class="clay-btn btn-google">
            <svg width="18" height="18" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Log in with Google
        </button>

        <div class="footer-text">
            Don't have an account? <a href="#">Sign Up</a>
        </div>
    </form>
</div>

<script>
    const illustration = document.getElementById('illustration');
    const passInput = document.getElementById('passInput');
    const toggleShow = document.getElementById('toggleShow');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyes = document.querySelectorAll('.eye');
    const pupils = document.querySelectorAll('.pupil');

    let isPasswordFocused = false;
    let isPasswordVisible = false;

    const eyeOpenPath = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
    const eyeClosedPath = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';

    function updateCharacterState() {
        if (isPasswordFocused) {
            if (isPasswordVisible) {
                illustration.classList.add('is-hiding');
                illustration.classList.remove('is-closed-eyes');
            } else {
                illustration.classList.remove('is-hiding');
                illustration.classList.add('is-closed-eyes');
            }
        } else {
            illustration.classList.remove('is-hiding');
            illustration.classList.remove('is-closed-eyes');
        }
    }

    passInput.addEventListener('focus', () => {
        isPasswordFocused = true;
        updateCharacterState();
    });

    passInput.addEventListener('blur', () => {
        isPasswordFocused = false;
        updateCharacterState();
    });

    toggleShow.addEventListener('click', () => {
        isPasswordVisible = !isPasswordVisible;
        passInput.type = isPasswordVisible ? 'text' : 'password';
        eyeIcon.innerHTML = isPasswordVisible ? eyeClosedPath : eyeOpenPath;
        updateCharacterState();
        passInput.focus();
    });

    document.addEventListener('mousemove', (e) => {
        if (illustration.classList.contains('is-hiding')) return;

        const { clientX, clientY } = e;

        eyes.forEach((eye, index) => {
            const pupil = pupils[index];
            const rect = eye.getBoundingClientRect();
            
            const eyeCenterX = rect.left + rect.width / 2;
            const eyeCenterY = rect.top + rect.height / 2;
            
            const deltaX = clientX - eyeCenterX;
            const deltaY = clientY - eyeCenterY;
            const angle = Math.atan2(deltaY, deltaX);
            
            const maxDistance = (rect.width / 2) - (pupil.getBoundingClientRect().width / 2) - 1; 
            
            const distance = Math.min(Math.hypot(deltaX, deltaY) / 20, maxDistance);
            
            const moveX = Math.cos(angle) * distance;
            const moveY = Math.sin(angle) * distance;
            
            pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    });

    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', function(event) {
        event.preventDefault();
        
        const email = document.getElementById('emailInput').value.trim();
        
        let displayName = 'You';
        if (email) {
            const usernamePart = email.split('@')[0];
            displayName = usernamePart.charAt(0).toUpperCase() + usernamePart.slice(1).toLowerCase();
        }
        localStorage.setItem('displayName', displayName);
        localStorage.setItem('username', '@' + (email ? email.split('@')[0].toLowerCase() : '') + '_Rishi');
        localStorage.setItem('score', '0');
        localStorage.setItem('dob', '24 Feb 2007');

        alert("Welcome to Anatomica! 🎉\n\nYour profile is ready!");
        
        window.location.href = "gallery.html"; 
    });
</script>
</body>
</html>
