<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Character Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        :root {
            --bg-body: #e6e8eb;
            --bg-card: #ffffff;
            --bg-illustration: #fcfbf9;
            --text-main: #111111;
            --text-sub: #777777;
            --border-color: #e0e0e0;
            --primary: #111111;
            --c-purple: #7c4af5;
            --c-pink: #ed4f9b;
            --c-yellow: #f5c83b;
            --c-white: hsl(0, 7%, 97%);
            
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
    background: linear-gradient(270deg, #07AEEA, #2BF598);
    background-size: 400% 400%;
    animation: gradientMove 8s ease infinite;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

        .login-card {
            display: flex;
            width: 1200px;
            height: 720px;
            background: var(--bg-card);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            animation: fadeScaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeScaleIn {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .illustration-side {
    flex: 1.15;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
}

        .char-container {
            position: relative;
            width: 380px;
            height: 300px;
            bottom: -2px;
        }

        .char {
            position: absolute;
            bottom: 0;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp { 
            from { transform: translateY(100%); } 
            to { transform: translateY(0); } 
        }

        .purple { 
            width: 95px; height: 220px; 
            background: var(--c-purple); 
            left: 50px; 
            border-radius: 20px 20px 0 0; 
            z-index: 1;
            animation: slideUp 0.7s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; 
        }
        .pink { 
            width: 65px; height: 150px; 
            background: var(--c-pink); 
            left: 330px;
            border-radius: 15px 15px 0 0;
            z-index: 3;
            animation: slideUp 0.7s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }
        .yellow { 
            width: 75px; height: 190px; 
            background: var(--c-yellow);
            right: 50px;
            border-radius: 15px 15px 0 0; 
            z-index: 2;
            animation: slideUp 0.7s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }
        .black { 
            width: 75px; height: 205px; 
            background: skyblue; 
            right: 150px;
            border-radius: 15px 15px 0 0; 
            z-index: 2;
            animation: slideUp 0.7s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }
        .white { 
            width: 190px; height: 95px; 
            background: var(--c-white); 
            left: 65px; 
            border-radius: 95px 95px 0 0; 
            z-index: 3;
            box-shadow:1px 1px 23px  #b0b0b0;
            animation: slideUp 0.7s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }

        .eye-container {
            position: absolute;
            top: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .purple .eye-container { top: 40px; gap: 20px; }
        .pink .eye-container { top: 25px; gap: 12px; }
        .yellow .eye-container { top: 35px; gap: 16px; }
        .white .eye-container { top: 35px; gap: 35px; }

        .eye { 
            width: 12px; height: 12px; 
            background: white; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            position: relative;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .white .eye { width: 14px; height: 14px;}
        
        .pupil { 
            width: 5px; height: 5px; 
            background: black; 
            border-radius: 50%; 
            position: absolute;
            transition: opacity 0.2s;
        }

        .white .pupil { width: 6px; height: 6px; }

        .white-smile {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 6px;
            border-bottom: 2.5px solid black;
            border-radius: 50%;
        }

        .yellow-smile {
            position: absolute;
            bottom: 125px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 6px;
            border-bottom: 3px solid black;
            border-radius: 50%;
        }

        .pink-smile {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 6px;
            border-bottom: 2.5px solid black;
            border-radius: 50%;
        }

        .is-hiding .purple { transform: translateY(140px) translateX(-10px) rotate(-8deg); }
        .is-hiding .pink { transform: translateY(140px); }
        .is-hiding .yellow { transform: translateY(150px) translateX(10px) rotate(8deg); }
        
        .is-hiding .white .eye { 
            height: 4px; 
            background: var(--primary); 
            border-radius: 4px;
            margin-top: 5px; 
        }
        .is-hiding .white .pupil { opacity: 0; }

        .form-side { 
            flex: 0.85; 
            padding: 70px 80px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }

        .logo { margin-bottom: 40px; }

        .header h2 { font-size: 32px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
        .header p { color: var(--text-sub); font-size: 14px; margin-bottom: 40px; }

        .input-group { margin-bottom: 28px; position: relative; }
        .input-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-sub); margin-bottom: 8px; }
        
        .input-group input {
            width: 100%; 
            padding: 8px 0 12px; 
            border: none; 
            border-bottom: 2px solid var(--border-color);
            font-size: 15px; 
            color: var(--text-main);
            outline: none; 
            transition: border-color 0.3s;
            background: transparent;
        }
        .input-group input:focus { border-bottom-color: var(--primary); }
        .input-group input::placeholder { color: #b0b0b0; }

        .toggle-btn { 
            position: absolute; 
            right: 0; 
            bottom: 12px; 
            cursor: pointer; 
            border: none; 
            background: none; 
            color: var(--text-sub);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }
        .toggle-btn:hover { color: var(--text-main); }
        .toggle-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .form-options { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 13px; 
            margin-bottom: 40px; 
            color: var(--text-sub);
        }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .checkbox-label input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
        .form-options a { color: var(--text-sub); text-decoration: none; transition: color 0.2s; }
        .form-options a:hover { color: var(--primary); }

        .btn-main {
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border-radius: 50px;
            border: none; 
            font-size: 15px;
            font-weight: 500; 
            cursor: pointer; 
            margin-bottom: 20px; 
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-main:active { transform: scale(0.98); }
        .btn-main:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.15); }

        .btn-google {
            width: 100%; 
            padding: 15px; 
            background: white; 
            border: 1.5px solid var(--border-color);
            border-radius: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            font-size: 15px;
            font-weight: 500; 
            color: var(--text-main);
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-google:hover { background: #f8f9fa; }

        .footer-text {
            text-align: center;
            font-size: 13px;
            color: var(--text-sub);
            margin-top: 30px;
        }
        .footer-text a { color: var(--text-main); text-decoration: none; font-weight: 500; }

        .lens {
            position: absolute;
            width: 28px; 
            height: 28px;
            border: 2px solid #333; 
            border-radius: 45%;
            border-top-left-radius: 0px;
            background: rgba(255, 255, 255, 0.3); 
            z-index: 10;
            pointer-events: none; 
        }
        
        .pink .eye-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px; 
        }
        
        .danda {
            width: 2px;
            height: 2px;
            background: #333;
            position: absolute;
            top: 6px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 11;
        }
        
        .pink .lens-left {
            left: 4px;
        }
        
        .pink .lens-right {
            right: 4px;
        }

        .lensi {
            position: absolute;
            width: 23px; 
            height: 18px;
            border: 2px solid #333; 
            background: rgba(255, 255, 255, 0.3); 
            z-index: 10;
            pointer-events: none; 
            top: -2px;
        }
        
        .dandi {
            width: 5px;
            height: 2px;
            background: #333;
            position: absolute;
            top: 6px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 11;
        }
        
        .black .lens-left {
            left: 13px;
        }
        
        .black .lens-right {
            right: 13px;
        }

        .black-smile {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 6px;
            border-bottom: 2.5px solid black;
            border-radius: 50%;
        }
        .purple-smile {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 6px;
            border-bottom: 2.5px solid black;
            border-radius: 50%;
        }
        .cute{
            position: absolute;
            top: -10px;
            left: 90%;
            transform: translateX(-50%);
        }
        .whitei-smile{
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        @keyframes blink {
            0%, 2%, 100% { transform: scaleY(1); }
            1% { transform: scaleY(0.1); }
        }

        .eye { 
            animation: blink 4s infinite ease-in-out; 
        }

        .purple .eye { animation-delay: 0.2s; }
        .pink .eye { animation-delay: 1.5s; }
        .yellow .eye { animation-delay: 0.7s; }
        .black .eye { animation-delay: 2.1s; }
        .white .eye { animation-delay: 0.5s; }

        @keyframes bob {
            0%, 100% { margin-top: 0; }
            50% { margin-top: 2px; }
        }

        .eye-container, 
        .yellow-smile, .pink-smile, .black-smile, 
        .purple-smile, .whitei-smile, .cute, 
        .lens, .lensi, .danda, .dandi {
            animation: bob 3s infinite ease-in-out;
        }

        .is-closed-eyes .eye {
            height: 4px !important;
            background: var(--text-main) !important;
            border-radius: 4px !important;
            margin-top: 6px;
            animation: none;
        }

        .is-closed-eyes .pupil {
            opacity: 0;
        }

        .is-closed-eyes .white .eye {
            box-shadow: none;   
        }

        .yellow .cap {
            position: absolute;
            top: -12px; 
            left: -3px; 
            width: 81px;
            height: 32px;
            background: #0f172a; 
            border-radius: 30px 30px 0 0; 
            z-index: 15;
        }

        .yellow .cap-brim {
            position: absolute;
            bottom: 0px;
            left: -22px; 
            width: 35px;
            height: 10px;
            background: #e11d48; 
            border-radius: 10px 0 0 10px;
            border: 2px solid #0f172a;
            border-right: none;
        }

        .yellow .cap::after {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 5px;
            background: #e11d48;
            border-radius: 5px 5px 0 0;
        }
        .white-half{
            background: #111111;
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 191px;
            height: 20px;
            border-top: 2.5px solid black;
            box-shadow:0px -10px 5px #111111;
        }

        .panda{
            position: absolute;        
            width: 28px; 
            height: 28px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0,1); 
            box-shadow:0px 0px 6px 10px black;
            z-index: 10;
            pointer-events: none;
        }
        .white .eare-container {
            position: relative;
            top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px; 
        }
        .white .lens-left {
            left: 11px;
        }
        
        .white .lens-right {
            right: 11px;
        }

        .white .eye-container {                 
            top: 25px; 
            gap: 32px; 
        }

        .white .eye { 
            width: 36px !important; 
            height: 42px !important; 
            background: #000000 !important; 
            border-radius: 55% 45%  55% 45%  !important; 
            box-shadow:0px 0px 5px #000000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .white .eye:nth-child(1) {
            transform: rotate(-12deg);
        }
        .white .eye:nth-child(2) {
            transform: rotate(12deg);
            border-radius:  45% 55%  45% 55% !important; 
        }

        .white .pupil { 
            width: 14px !important; 
            height: 14px !important; 
            background: white !important; 
            border-radius: 50% !important;
            position: relative !important;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 1 !important;
        }

        .white .pupil::after {
            content: '';
            width: 6px;
            height: 6px;
            background: #111111;
            border-radius: 50%;
            position: absolute;
        }

        .is-hiding .white .eye,
        .is-closed-eyes .white .eye { 
            height: 44px !important; 
            background: #111111 !important; 
            margin-top: 0 !important; 
        }

        .is-hiding .white .pupil,
        .is-closed-eyes .white .pupil { 
            height: 4px !important; 
            border-radius: 2px !important;
            background: white !important;
            opacity: 1 !important;
        }

        .is-hiding .white .pupil::after,
        .is-closed-eyes .white .pupil::after {
            display: none; 
        }

        .purple .cap {
            position: absolute;
            top: -12px; 
            left: -3px; 
            width: 100px;
            height: 47px;
            background: rgb(65, 42, 0); 
            border-radius: 30px 30px 0 0; 
            z-index: 15;
        }

      

        .purple .cap::after {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 5px;
            border-radius: 5px 5px 0 0;
        }
        .cap-V{
            position: absolute;
            top: 30px;
            left: 35px;
            background: var(--c-purple);
            width: 30px;
            height: 20px;
            border-radius: 30px 30px 0 0; 
        }

        .illustration-side {
            background: whitesmoke;
            position: relative;
            overflow: hidden;
        }
        
        .blossom-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .petal {
            position: absolute;
            top: -20px;
            width: 12px;
            height: 18px;
            background: linear-gradient(to bottom, #ffc0cb, #f8bbd0);
            border-radius: 80% 10% 80% 10%; 
            opacity: 0;
            filter: drop-shadow(0 0 5px rgba(255, 182, 193, 0.3));
            animation: drift 15s linear infinite;
        }
        
        @keyframes drift {
            0% { 
                transform: translateY(0) translateX(0) rotate(0deg) scale(0.8); 
                opacity: 0;
            }
            15% { opacity: 0.7; }
            85% { opacity: 0.7; }
            100% { 
                transform: translateY(110vh) translateX(150px) rotate(720deg) scale(1.2); 
                opacity: 0;
            }
        }
        
        .petal:nth-child(1) { left: 10%; animation-delay: 0s; width: 14px; height: 20px; }
        .petal:nth-child(2) { left: 25%; animation-delay: 5s; transform: rotate(45deg); }
        .petal:nth-child(3) { left: 45%; animation-delay: 2s; width: 10px; filter: blur(1px); }
        .petal:nth-child(4) { left: 60%; animation-delay: 8s; }
        .petal:nth-child(5) { left: 80%; animation-delay: 3s; width: 15px; height: 22px; }
        .petal:nth-child(6) { left: 90%; animation-delay: 11s; filter: blur(0.5px); }
        .petal:nth-child(7) { left: 35%; animation-delay: 14s; }
        .petal:nth-child(8) { left: 70%; animation-delay: 6s; opacity: 0.4; }
        
        .char {
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) backwards !important;
        }

        .black
        
        .cap {
            position: absolute;
            top: -12px; 
            left: -3px; 
            width: 80px;
            height: 47px;
            background: rgb(65, 42, 0); 
            border-radius: 30px 30px 0 0; 
            z-index: 15;
        }

      

        .black .cap::after {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 5px;
            border-radius: 5px 5px 0 0;
        }
        
    </style>
</head>

<script>
    const illustration = document.getElementById('illustration');
    const passInput = document.getElementById('passInput');
    const toggleShow = document.getElementById('toggleShow');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyes = document.querySelectorAll('.eye');
    const pupils = document.querySelectorAll('.pupil');

    let isPasswordFocused = false;
    let isPasswordVisible = false;

    const eyeOpenPath = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
    const eyeClosedPath = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';

function updateCharacterState() {
    if (isPasswordFocused) {
        if (isPasswordVisible) {
            illustration.classList.add('is-hiding');
            illustration.classList.remove('is-closed-eyes');
        } else {
            illustration.classList.remove('is-hiding');
            illustration.classList.add('is-closed-eyes');
        }
    } else {
        illustration.classList.remove('is-hiding');
        illustration.classList.remove('is-closed-eyes');
    }
}

    passInput.addEventListener('focus', () => {
        isPasswordFocused = true;
        updateCharacterState();
    });

    passInput.addEventListener('blur', () => {
        isPasswordFocused = false;
        updateCharacterState();
    });

    toggleShow.addEventListener('click', () => {
        isPasswordVisible = !isPasswordVisible;
        passInput.type = isPasswordVisible ? 'text' : 'password';
        eyeIcon.innerHTML = isPasswordVisible ? eyeClosedPath : eyeOpenPath;
        updateCharacterState();
        passInput.focus();
    });

    document.addEventListener('mousemove', (e) => {
        if (illustration.classList.contains('is-hiding')) return;

        const { clientX, clientY } = e;

        eyes.forEach((eye, index) => {
            const pupil = pupils[index];
            const rect = eye.getBoundingClientRect();
            
            const eyeCenterX = rect.left + rect.width / 2;
            const eyeCenterY = rect.top + rect.height / 2;
            
            const deltaX = clientX - eyeCenterX;
            const deltaY = clientY - eyeCenterY;
            const angle = Math.atan2(deltaY, deltaX);
            
            const maxDistance = (rect.width / 2) - (pupil.getBoundingClientRect().width / 2) - 1; 
            
            const distance = Math.min(Math.hypot(deltaX, deltaY) / 20, maxDistance);
            
            const moveX = Math.cos(angle) * distance;
            const moveY = Math.sin(angle) * distance;
            
            pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    });

    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const email = document.getElementById('emailInput').value;
        const password = document.getElementById('passInput').value;
        alert("Welcome to Anatomica!");
        window.location.href = "gallery.html"; 
    });

</script>
