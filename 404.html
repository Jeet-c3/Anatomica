<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found</title>

    <style media="screen">
      body { 
        background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); 
        color: #1e293b; 
        font-family: Roboto, Helvetica, Arial, sans-serif; 
        margin: 0; 
        padding: 0; 
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #container {
        padding: 20px;
        width: 900px;
        max-width: 900px;
        box-sizing: border-box;
      }
      #message { 
        background: #ffffff; 
        padding: 40px 32px; 
        border-radius: 36px; 
        text-align: center;
        box-shadow: 
          12px 12px 24px rgba(14, 165, 233, 0.25), 
          inset 4px 4px 8px rgba(255, 255, 255, 1), 
          inset -10px -10px 20px rgba(14, 165, 233, 0.12);
      }
      #message h2 { 
        color: #1e40af; 
        font-weight: 900; 
        font-size: 92px; 
        margin: 0 0 8px 0; 
        line-height: 1;
      }
      #message h1 { 
        font-size: 34px; 
        font-weight: 700; 
        color: #0f172a; 
        margin: 0 0 16px;
      }
      #message p { 
        line-height: 160%; 
        margin: 16px 0; 
        font-size: 18px; 
        color: #475569;
      }
      #message .reload-btn { 
        display: block; 
        text-align: center; 
        background: #2563eb; 
        text-transform: uppercase; 
        text-decoration: none; 
        color: #ffffff; 
        font-weight: 700;
        letter-spacing: 1.2px;
        padding: 16px 24px; 
        border-radius: 24px; 
        margin: 28px 0;
        font-size: 14px;
        transition: all 0.25s ease-in-out;
        box-shadow: 
          0 8px 16px rgba(37, 99, 235, 0.35),
          inset 3px 3px 6px rgba(255, 255, 255, 0.4), 
          inset -4px -4px 8px rgba(0, 0, 0, 0.2);
      }
      #message .reload-btn:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
        box-shadow: 
          0 12px 20px rgba(37, 99, 235, 0.45), 
          inset 4px 4px 8px rgba(255, 255, 255, 0.5), 
          inset -5px -5px 10px rgba(0, 0, 0, 0.25);
      }
      #message .reload-btn:active {
        transform: translateY(1px);
        box-shadow: 
          0 4px 8px rgba(37, 99, 235, 0.35), 
          inset 2px 2px 4px rgba(255, 255, 255, 0.3), 
          inset -2px -2px 4px rgba(0, 0, 0, 0.2);
      }
      #message h3 { 
        color: #1e40af; 
        font-weight: 600; 
        font-size: 14px; 
        margin: 28px 0 8px; 
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      #message .info-text {
        font-size: 13px;
        color: #64748b;
        line-height: 150%;
      }
      code {
        background: #f1f5f9;
        padding: 2px 6px;
        border-radius: 6px;
        font-family: monospace;
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="message">
        <h2>404</h2>
        <h1>Page Not Found</h1>
        <p>The specified file was not found on this website. Please check the URL for mistakes and try again.</p>

        <a href="https://anatomica-e2810.web.app" class="reload-btn">Load Website Again</a>

        <h3>Why am I seeing this?</h3>
        <p class="info-text">Something went wrong.</p>
      </div>
    </div>
  </body>
</html>
